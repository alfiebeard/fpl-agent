# FPL Optimizer Configuration

# FPL API Configuration
fpl:
  base_url: "https://fantasy.premierleague.com/api"
  team_id: null    # Set via environment variable FPL_TEAM_ID

# Data Sources
data_sources:
  fpl_api:
    enabled: true
    timeout: 30
  fbref:
    enabled: true
    timeout: 60
  understat:
    enabled: true
    timeout: 60

# Team Configuration
team:
  budget: 100.0
  squad_size: 15
  formation_constraints:
    goalkeepers: 2
    defenders: 5
    midfielders: 5
    forwards: 3
  max_players_per_team: 3

# Optimization Configuration
optimization:
  solver: "PULP_CBC_CMD"
  time_limit: 300  # seconds
  gap_tolerance: 0.01
  focus_horizons:
    - 1   # Next gameweek
    - 5   # Next 5 gameweeks
    - 10  # Next 10 gameweeks

# Expected Points Configuration
xpts:
  weights:
    form: 0.3
    xg_xa: 0.4
    fixtures: 0.2
    minutes: 0.1
  fixture_difficulty_adjustment: true
  injury_adjustment: true
  price_change_consideration: true

# LLM Configuration
llm:
  # Main LLM for complex team optimization
  main:
    model: "gemini-2.5-pro"  # Thinking and web search
    max_output_tokens: 65536
    temperature: 0.3
    top_p: 0.8
    top_k: 25
  
  # Lightweight LLM for team-specific analysis
  lightweight:
    model: "gemini-2.5-flash-lite"  # Cost-effective for team analysis
    max_output_tokens: 8192
    temperature: 0.2
    top_p: 0.8
    top_k: 25

# Embedding Configuration
# Controls the embedding-based player filtering system
embeddings:
  # Sentence transformer model to use for embeddings
  model: "BAAI/bge-base-en-v1.5"
  
  # Caching configuration
  cache_enabled: true
  cache_expiry_hours: 24
  
  # Performance settings
  batch_size: 100
  device: "auto"  # "auto", "cpu", "cuda", "mps" (for Apple Silicon)
  
  # Position-specific queries for embedding similarity
  position_queries:
    GK: "Must-have OR recommended, fit, high points, clean sheet, saves, consistent starter, good fixtures. NOT out of form, injured, suspended."
    DEF: "Must-have OR recommended, fit, high points, clean sheet, attacking potential, consistent starter, good fixtures. NOT out of form, injured, suspended."
    MID: "Must-have OR recommended, fit, high points, goals, assists, consistent starter, set pieces, penalties, good fixtures. NOT out of form, injured, suspended."
    FWD: "Must-have OR recommended, fit, high points, goals, assists, consistent starter, set pieces, penalties, good fixtures. NOT out of form, injured, suspended."
  
  # Player selection counts per position
  selection_counts:
    GK: 15
    DEF: 60
    MID: 70
    FWD: 30
  
  # Hybrid scoring configuration
  hybrid_scoring:
    embedding_weight: 0.6
    keyword_weight: 0.4
    keyword_bonuses:
      "must-have": 0.5
      "recommended": 0.3
      "rotation risk": -0.2
      "avoid": -0.5

# Likely Starter Configuration
# Controls the system for determining if players are likely starters
likely_starter:
  # Keywords that indicate a player is likely to start
  starter_keywords:
    - "must-have"
    - "nailed"
    - "consistent starter"
    - "first choice"
    - "key player"
    - "expected to start"
    - "fit and available"
    - "no rotation risk"
  
  # Keywords that indicate a player is unlikely to start
  bench_keywords:
    - "rotation risk"
    - "bench"
    - "unlikely to start"
    - "doubt"
    - "injured"
    - "out"
    - "rested"
    - "competition for places"
    - "minutes may be limited"
    - "avoid"
    - "unlikely to see playing time"
  
  # Anchor texts for embedding similarity fallback
  embedding_anchors:
    positive: "likely to start"
    negative: "unlikely to start"
  
  # Weights for hybrid scoring when keyword matching is inconclusive
  scoring_weights:
    keyword_weight: 0.7
    embedding_weight: 0.3

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
