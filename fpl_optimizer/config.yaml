# FPL Optimizer Configuration

# FPL API Configuration
fpl:
  base_url: "https://fantasy.premierleague.com/api"
  team_id: null    # Set via environment variable FPL_TEAM_ID

# Data Sources
data_sources:
  fpl_api:
    enabled: true
    timeout: 30
  fbref:
    enabled: true
    timeout: 60
  understat:
    enabled: true
    timeout: 60

# Team Configuration
team:
  budget: 100.0
  squad_size: 15
  formation_constraints:
    goalkeepers: 2
    defenders: 5
    midfielders: 5
    forwards: 3
  max_players_per_team: 3

# Optimization Configuration
optimization:
  solver: "PULP_CBC_CMD"
  time_limit: 300  # seconds
  gap_tolerance: 0.01
  focus_horizons:
    - 1   # Next gameweek
    - 5   # Next 5 gameweeks
    - 10  # Next 10 gameweeks

# Expected Points Configuration
xpts:
  weights:
    form: 0.3
    xg_xa: 0.4
    fixtures: 0.2
    minutes: 0.1
  fixture_difficulty_adjustment: true
  injury_adjustment: true
  price_change_consideration: true

# LLM Configuration
llm:
  # Main LLM for complex team optimization
  main:
    model: "gemini-2.5-pro"  # Thinking and web search
    max_output_tokens: 65536
    temperature: 0.3
    top_p: 0.8
    top_k: 25
  
  # Lightweight LLM for team-specific analysis
  lightweight:
    model: "gemini-2.5-flash-lite"  # Cost-effective for team analysis
    max_output_tokens: 8192
    temperature: 0.2
    top_p: 0.8
    top_k: 25

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
